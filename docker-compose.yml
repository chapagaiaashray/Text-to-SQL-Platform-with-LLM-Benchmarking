# =============================================================
#  Dev orchestration. Run:  docker compose up --build
#  - db:      PostgreSQL 16 (hosts `metadata` + `spider` DBs)
#  - backend: FastAPI (hot-reload, code mounted from ./backend)
#  Frontend is added in coming Weeks. 
# =============================================================
services:
  db:
    image: postgres:16
    container_name: t2sql_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # POSTGRES_DB defaults to the user name; our init script creates
      # `spider` and `metadata` explicitly.
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run only on an empty data dir (first boot).
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: t2sql_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the DB host is the service name "db".
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend          # hot reload in dev
      - ./data:/app/data:ro             # Spider files visible to scripts
    depends_on:
      db:
        condition: service_healthy
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
